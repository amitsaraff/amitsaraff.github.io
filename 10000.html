<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10,000 steps · 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c:  19px;   /* cell size */
      --cg:  3px;   /* cell gap  */
      --mg: 40px;   /* month column gap */
      --mw: calc(7 * var(--c) + 6 * var(--cg));  /* 151px per month grid */
    }

    /* ── scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    body {
      background: #070707;
      color: #5a5a5a;
      font-family: monospace;
      font-size: 13px;
      padding: 52px 32px 72px;
    }

    .wrap {
      max-width: calc(3 * var(--mw) + 2 * var(--mg));  /* 533px: heatmap edge-to-edge */
      margin: 0 auto;
    }

    /* ── header ── */
    h1 {
      font-size: 28px;
      font-weight: normal;
      color: #FFD700;
      letter-spacing: 4px;
      line-height: 1;
    }
    .rule { color: #252525; }
    .meta {
      color: #272727;
      font-size: 10px;
      letter-spacing: 1.5px;
      margin-top: 8px;
    }
    .meta em { color: #404040; font-style: normal; }

    /* ── year progress bar ── */
    .progress-wrap {
      margin: 20px 0 30px;
    }
    .progress-track {
      height: 2px;
      background: #141414;
      position: relative;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      background: #FFD700;
      position: relative;
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -1px;
      top: -3px;
      width: 2px;
      height: 8px;
      background: #FFD700;
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }
    .progress-labels span {
      font-size: 8px;
      color: #222;
      letter-spacing: 1px;
    }

    /* ── stats ── */
    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .card {
      border: 1px solid #161616;
      padding: 14px 16px;
      flex: 1;
      min-width: 110px;
      opacity: 0;
      animation: fadeUp 0.5s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-val {
      font-size: 18px;
      color: #FFD700;
      letter-spacing: 1px;
    }
    .card-lbl {
      font-size: 8px;
      color: #2c2c2c;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 7px;
    }

    /* ── heatmap ── */
    .months {
      display: grid;
      grid-template-columns: repeat(3, var(--mw));
      gap: 36px var(--mg);
      margin-bottom: 36px;
    }

    .month {
      opacity: 0;
      animation: fadeIn 0.6s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .month-name {
      color: #FFD700;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid #141414;
    }

    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, var(--c));
      gap: var(--cg);
      margin-bottom: 3px;
    }
    .dow-lbl {
      font-size: 7px;
      color: #1e1e1e;
      text-align: center;
      line-height: var(--c);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, var(--c));
      gap: var(--cg);
    }

    .cell {
      width: var(--c);
      height: var(--c);
      border-radius: 3px;
    }
    .cell.empty   { background: transparent !important; }
    .cell.no-data { background: #0f0f0f; }
    .cell.day {
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s;
    }
    .cell.day:hover {
      transform: scale(1.5);
      filter: brightness(1.4) saturate(1.2);
      z-index: 10;
      position: relative;
    }

    .month-sub {
      color: #1e1e1e;
      font-size: 8px;
      letter-spacing: 1px;
      margin-top: 7px;
    }
    .month-sub em { color: #2a4a30; font-style: normal; }

    /* ── tooltip ── */
    #tip {
      position: fixed;
      background: #0d0d0d;
      border: 1px solid #1f1f1f;
      padding: 10px 14px;
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s;
      z-index: 999;
      white-space: nowrap;
      line-height: 1.7;
    }
    #tip.show { opacity: 1; }
    .tip-date  { color: #FFD700; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }
    .tip-steps { color: #e0e0e0; font-size: 16px; letter-spacing: 0.5px; }
    .tip-delta { font-size: 10px; }
    .tip-delta.up { color: #3d8a4e; }
    .tip-delta.dn { color: #943030; }

    /* ── legend ── */
    .legend {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding-top: 4px;
      border-top: 1px solid #111;
    }
    .leg-label { color: #222; font-size: 9px; letter-spacing: 1px; }
    .leg-grad {
      width: 90px;
      height: 8px;
      border-radius: 1px;
      background: linear-gradient(to right,
        hsl(0,  80%, 40%),
        hsl(20, 80%, 48%),
        hsl(48, 85%, 48%),
        hsl(90, 65%, 37%),
        hsl(135,70%, 29%)
      );
    }
    .leg-items { display: flex; gap: 12px; }
    .leg-item  { display: flex; align-items: center; gap: 5px; }
    .leg-sq    { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }
    .leg-t     { color: #2a2a2a; font-size: 8px; }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>10,000 steps <span class="rule">·</span> 2026</h1>
    <p class="meta">daily tracking // <em id="days-tracked"></em></p>
  </header>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-labels">
      <span>jan</span><span>apr</span><span>jul</span><span>oct</span><span>dec</span>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="months" id="months"></div>

  <div class="legend">
    <span class="leg-label">steps →</span>
    <div class="leg-grad"></div>
    <div class="leg-items">
      <div class="leg-item">
        <div class="leg-sq" style="background:hsl(0,80%,40%)"></div>
        <span class="leg-t">&lt; 8k</span>
      </div>
      <div class="leg-item">
        <div class="leg-sq" style="background:hsl(25,80%,48%)"></div>
        <span class="leg-t">8–9.5k</span>
      </div>
      <div class="leg-item">
        <div class="leg-sq" style="background:hsl(48,85%,48%)"></div>
        <span class="leg-t">9.5–10k</span>
      </div>
      <div class="leg-item">
        <div class="leg-sq" style="background:hsl(90,65%,37%)"></div>
        <span class="leg-t">10k ✓</span>
      </div>
      <div class="leg-item">
        <div class="leg-sq" style="background:hsl(135,70%,29%)"></div>
        <span class="leg-t">10.5k+</span>
      </div>
    </div>
  </div>

</div>

<div id="tip">
  <div class="tip-date"  id="tip-d"></div>
  <div class="tip-steps" id="tip-s"></div>
  <div class="tip-delta" id="tip-g"></div>
</div>

<script>
// ── embedded data (mirrors steps.csv) ──────────────────────────────────────
const CSV = `date,steps
2026-01-01,9876
2026-01-02,10234
2026-01-03,8765
2026-01-04,9012
2026-01-05,10456
2026-01-06,8234
2026-01-07,9678
2026-01-08,10789
2026-01-09,7890
2026-01-10,10345
2026-01-11,9456
2026-01-12,8901
2026-01-13,10567
2026-01-14,9234
2026-01-15,8543
2026-01-16,10678
2026-01-17,9876
2026-01-18,10123
2026-01-19,8765
2026-01-20,9456
2026-01-21,10234
2026-01-22,7634
2026-01-23,9678
2026-01-24,10345
2026-01-25,8765
2026-01-26,10978
2026-01-27,9012
2026-01-28,8234
2026-01-29,10456
2026-01-30,9876
2026-01-31,10123
2026-02-01,8765
2026-02-02,9456
2026-02-03,10234
2026-02-04,7523
2026-02-05,10856
2026-02-06,9345
2026-02-07,8012
2026-02-08,10567
2026-02-09,9876
2026-02-10,10234
2026-02-11,8765
2026-02-12,9678
2026-02-13,10456
2026-02-14,8901
2026-02-15,10123
2026-02-16,9456
2026-02-17,7789
2026-02-18,10789
2026-02-19,9234
2026-02-20,8543
2026-02-21,10678
2026-02-22,9876
2026-02-23,10234
2026-02-24,8765
2026-02-25,9012
2026-02-26,10456
2026-02-27,9678
2026-02-28,10934
2026-03-01,8765
2026-03-02,9456
2026-03-03,10234
2026-03-04,7890
2026-03-05,10789
2026-03-06,9345
2026-03-07,8012
2026-03-08,10567`;

// ── parse ──────────────────────────────────────────────────────────────────
function parse(raw) {
  return raw.trim().split('\n').slice(1).map(line => {
    const [date, steps] = line.split(',');
    return { date: date.trim(), steps: parseInt(steps, 10) };
  });
}

function buildMap(data) {
  const m = {};
  data.forEach(d => { m[d.date] = d.steps; });
  return m;
}

// ── color ──────────────────────────────────────────────────────────────────
// Anchors: [steps, hue, saturation, lightness]
// Red (below 8k) → Orange → Amber → Yellow → Yellow-green (10k) → Deep green (10.5k+)
const ANCHORS = [
  [7500,   0,  80, 40],
  [8000,   8,  80, 45],
  [8500,  18,  80, 48],
  [9000,  30,  82, 48],
  [9500,  48,  85, 48],
  [10000, 88,  65, 37],
  [10500, 115, 65, 32],
  [11000, 135, 70, 27],
];

function interpolate(s) {
  if (s <= ANCHORS[0][0]) return ANCHORS[0].slice(1);
  for (let i = 1; i < ANCHORS.length; i++) {
    if (s <= ANCHORS[i][0]) {
      const t   = (s - ANCHORS[i-1][0]) / (ANCHORS[i][0] - ANCHORS[i-1][0]);
      return [
        ANCHORS[i-1][1] + t * (ANCHORS[i][1] - ANCHORS[i-1][1]),
        ANCHORS[i-1][2] + t * (ANCHORS[i][2] - ANCHORS[i-1][2]),
        ANCHORS[i-1][3] + t * (ANCHORS[i][3] - ANCHORS[i-1][3]),
      ];
    }
  }
  return ANCHORS[ANCHORS.length - 1].slice(1);
}

function stepsToColor(s) {
  const [h, sat, l] = interpolate(s);
  return `hsl(${h.toFixed(1)},${sat.toFixed(1)}%,${l.toFixed(1)}%)`;
}

// ── formatting ─────────────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString(); }

function fmtDate(s) {
  const [y, m, d] = s.split('-');
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return `${months[+m-1]} ${+d}, ${y}`;
}

// ── stats ──────────────────────────────────────────────────────────────────
function calcStats(data) {
  const total  = data.reduce((s, d) => s + d.steps, 0);
  const avg    = Math.round(total / data.length);
  const atGoal = data.filter(d => d.steps >= 10000).length;

  let streak = 0;
  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i].steps >= 10000) streak++;
    else break;
  }

  const best = data.reduce((a, b) => b.steps > a.steps ? b : a);
  return { total, avg, atGoal, streak, best, days: data.length };
}

function renderStats(stats) {
  const el = document.getElementById('stats');
  const cards = [
    { val: fmt(stats.total),                                          lbl: 'total steps' },
    { val: `${stats.atGoal} / ${stats.days}`,                        lbl: 'days at goal' },
    { val: fmt(stats.avg),                                           lbl: 'daily average' },
    { val: `${stats.streak} day${stats.streak !== 1 ? 's' : ''}`,   lbl: 'current streak' },
  ];
  el.innerHTML = cards.map(c =>
    `<div class="card">
       <div class="card-val">${c.val}</div>
       <div class="card-lbl">${c.lbl}</div>
     </div>`
  ).join('');
}

// ── heatmap ────────────────────────────────────────────────────────────────
const MONTH_NAMES = [
  'JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
  'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'
];
const DOW_LABELS = ['M','T','W','T','F','S','S'];

function renderMonths(dataMap) {
  const el = document.getElementById('months');

  const monthKeys = Array.from({ length: 12 }, (_, i) =>
    `2026-${String(i + 1).padStart(2, '0')}`
  );

  el.innerHTML = monthKeys.map((ym, mi) => {
    const [year, month] = ym.split('-').map(Number);
    const monthIdx = month - 1;
    const mm = String(month).padStart(2, '0');

    const firstDow    = (new Date(year, monthIdx, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();

    let goalCount = 0, dataCount = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${year}-${mm}-${String(d).padStart(2, '0')}`;
      if (dataMap[key] !== undefined) {
        dataCount++;
        if (dataMap[key] >= 10000) goalCount++;
      }
    }

    const dowHdr = DOW_LABELS.map(d => `<div class="dow-lbl">${d}</div>`).join('');

    let cells = '';
    for (let i = 0; i < firstDow; i++) cells += `<div class="cell empty"></div>`;
    for (let day = 1; day <= daysInMonth; day++) {
      const key   = `${year}-${mm}-${String(day).padStart(2, '0')}`;
      const steps = dataMap[key];
      if (steps !== undefined) {
        const color = stepsToColor(steps);
        cells += `<div class="cell day"
          style="background:${color}"
          data-date="${key}" data-steps="${steps}"></div>`;
      } else {
        cells += `<div class="cell no-data"></div>`;
      }
    }

    const sub = dataCount > 0 ? `<em>${goalCount}</em>/${dataCount} at goal` : '';
    const delay = (mi * 0.05 + 0.3).toFixed(2);

    return `<div class="month" style="animation-delay:${delay}s">
      <div class="month-name">${MONTH_NAMES[monthIdx]}</div>
      <div class="dow-row">${dowHdr}</div>
      <div class="grid">${cells}</div>
      <div class="month-sub">${sub}</div>
    </div>`;
  }).join('');
}

// ── year progress bar ──────────────────────────────────────────────────────
function renderProgress(days) {
  const pct = (days / 365 * 100).toFixed(1);
  // animate after a short delay so the transition fires
  setTimeout(() => {
    document.getElementById('progress-fill').style.width = pct + '%';
  }, 80);
}

// ── tooltip ────────────────────────────────────────────────────────────────
function setupTooltip() {
  const tip  = document.getElementById('tip');
  const tipD = document.getElementById('tip-d');
  const tipS = document.getElementById('tip-s');
  const tipG = document.getElementById('tip-g');
  const GOAL = 10000;

  document.addEventListener('mousemove', e => {
    const cell = e.target.closest('.cell.day');
    if (!cell) { tip.className = ''; return; }

    const steps = parseInt(cell.dataset.steps, 10);
    const delta = steps - GOAL;

    tipD.textContent = fmtDate(cell.dataset.date);
    tipS.textContent = fmt(steps) + ' steps';

    if (delta >= 0) {
      tipG.textContent = '+' + fmt(delta) + ' above goal';
      tipG.className   = 'tip-delta up';
    } else {
      tipG.textContent = fmt(Math.abs(delta)) + ' below goal';
      tipG.className   = 'tip-delta dn';
    }

    tip.className = 'show';

    const W = window.innerWidth, H = window.innerHeight;
    const TW = 200, TH = 75;
    let x = e.clientX + 18, y = e.clientY - 58;
    if (x + TW > W) x = e.clientX - TW - 10;
    if (y < 0)       y = e.clientY + 18;
    if (y + TH > H)  y = H - TH - 8;

    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
}

// ── init ───────────────────────────────────────────────────────────────────
const data    = parse(CSV);
const dataMap = buildMap(data);
const stats   = calcStats(data);

document.getElementById('days-tracked').textContent =
  `${data.length} of 365 days · ${Math.round(data.length / 365 * 100)}% of year`;

renderProgress(data.length);
renderStats(stats);
renderMonths(dataMap);
setupTooltip();
</script>
</body>
</html>
