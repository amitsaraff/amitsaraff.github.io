<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10,000 steps · 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* ── layout ── */
      --c:  24px;   /* cell size  (+26%) */
      --cg:  4px;   /* cell gap */
      --mg: 50px;   /* month column gap */
      --mw: calc(7 * var(--c) + 6 * var(--cg));  /* 192px per month grid */

      /* ── theme (overridden per-palette by JS) ── */
      --bg:              #070707;
      --accent:          #FFD700;
      --fg-bright:       #e0e0e0;
      --fg-mid:          #707070;
      --fg-dim:          #585858;
      --fg-faint:        #444444;
      --fg-rule:         #333333;
      --border-strong:   #161616;
      --border-soft:     #141414;
      --border-dim:      #111111;
      --surface:         #0d0d0d;
      --surface-border:  #1f1f1f;
      --muted-bg:        #0f0f0f;
      --up-color:        #3d8a4e;
      --dn-color:        #943030;
    }

    /* ── scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    body {
      background: var(--bg);
      color: var(--fg-dim);
      font-family: monospace;
      font-size: 16px;
      padding: 65px 40px 90px;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .wrap {
      max-width: calc(3 * var(--mw) + 2 * var(--mg));  /* 676px: edge-to-edge */
      margin: 0 auto;
    }

    /* ── header ── */
    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 35px;
      font-weight: normal;
      color: var(--accent);
      letter-spacing: 4px;
      line-height: 1;
      transition: color 0.4s ease;
    }
    .rule { color: var(--fg-rule); }

    /* ── palette selector ── */
    .sel-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .sel-lbl {
      font-size: 10px;
      color: var(--fg-faint);
      letter-spacing: 1px;
    }
    #palette-sel {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--accent);
      font-family: monospace;
      font-size: 11px;
      padding: 5px 10px;
      letter-spacing: 1px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.3s, color 0.3s;
    }
    #palette-sel option { background: #111; color: #ddd; }

    .meta {
      color: var(--fg-dim);
      font-size: 12px;
      letter-spacing: 1.5px;
      margin-top: 10px;
      transition: color 0.4s ease;
    }
    .meta em { color: var(--fg-mid); font-style: normal; }

    /* ── year progress bar ── */
    .progress-wrap { margin: 24px 0 36px; }
    .progress-track {
      height: 2px;
      background: var(--border-soft);
      position: relative;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      position: relative;
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1), background 0.4s ease;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -1px;
      top: -4px;
      width: 2px;
      height: 10px;
      background: var(--accent);
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 7px;
    }
    .progress-labels span {
      font-size: 10px;
      color: var(--fg-faint);
      letter-spacing: 1px;
    }

    /* ── stats ── */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }
    .card {
      border: 1px solid var(--border-strong);
      padding: 17px 20px;
      flex: 1;
      min-width: 138px;
      opacity: 0;
      animation: fadeUp 0.5s ease both;
      transition: border-color 0.4s ease;
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-val {
      font-size: 22px;
      color: var(--accent);
      letter-spacing: 1px;
      transition: color 0.4s ease;
    }
    .card-lbl {
      font-size: 10px;
      color: var(--fg-dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
      transition: color 0.4s ease;
    }

    /* ── heatmap ── */
    .months {
      display: grid;
      grid-template-columns: repeat(3, var(--mw));
      gap: 44px var(--mg);
      margin-bottom: 44px;
    }

    .month {
      opacity: 0;
      animation: fadeIn 0.6s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .month-name {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 9px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
      transition: color 0.4s ease, border-color 0.4s ease;
    }

    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, var(--c));
      gap: var(--cg);
      margin-bottom: 4px;
    }
    .dow-lbl {
      font-size: 11px;
      color: var(--fg-faint);
      text-align: center;
      line-height: var(--c);
      transition: color 0.4s ease;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, var(--c));
      gap: var(--cg);
    }

    .cell {
      width: var(--c);
      height: var(--c);
      border-radius: 3px;
    }
    .cell.empty   { background: transparent !important; }
    .cell.no-data { background: var(--muted-bg); transition: background 0.4s ease; }
    .cell.day {
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s;
    }
    .cell.day:hover {
      transform: scale(1.5);
      filter: brightness(1.4) saturate(1.2);
      z-index: 10;
      position: relative;
    }

    .month-sub {
      color: var(--fg-dim);
      font-size: 10px;
      letter-spacing: 1px;
      margin-top: 8px;
      transition: color 0.4s ease;
    }
    .month-sub em { color: var(--up-color); font-style: normal; transition: color 0.4s ease; }

    /* ── palette description ── */
    .palette-desc {
      font-size: 10px;
      color: var(--fg-faint);
      letter-spacing: 1px;
      margin-top: 4px;
      min-height: 14px;
    }

    /* ── tooltip ── */
    #tip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      padding: 12px 16px;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s;
      z-index: 999;
      white-space: nowrap;
      line-height: 1.7;
    }
    #tip.show { opacity: 1; }
    .tip-date  { color: var(--accent); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
    .tip-steps { color: var(--fg-bright); font-size: 20px; letter-spacing: 0.5px; }
    .tip-delta { font-size: 12px; }
    .tip-delta.up { color: var(--up-color); }
    .tip-delta.dn { color: var(--dn-color); }

    /* ── legend ── */
    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 6px;
      border-top: 1px solid var(--border-dim);
      transition: border-color 0.4s ease;
    }
    .leg-label { color: var(--fg-dim); font-size: 14px; letter-spacing: 1px; }
    .leg-grad {
      width: 150px;
      height: 15px;
      border-radius: 2px;
      transition: background 0.4s ease;
    }
    .leg-items { display: flex; gap: 16px; flex-wrap: wrap; }
    .leg-item  { display: flex; align-items: center; gap: 7px; }
    .leg-sq    { width: 15px; height: 15px; border-radius: 2px; flex-shrink: 0; transition: background 0.4s ease; }
    .leg-t     { color: var(--fg-dim); font-size: 14px; }
  </style>
</head>

// Active anchor set (mutated when palette switches)
let activeAnchors = PALETTES.spectral.anchors;

// ── parse ──────────────────────────────────────────────────────────────────
function parse(raw) {
  return raw.trim().split('\n').slice(1).map(line => {
    const [date, steps] = line.split(',');
    return { date: date.trim(), steps: parseInt(steps, 10) };
  });
}

function buildMap(data) {
  const m = {};
  data.forEach(d => { m[d.date] = d.steps; });
  return m;
}

// ── color ──────────────────────────────────────────────────────────────────
function interpolateHSL(s) {
  const A = activeAnchors;
  if (s <= A[0][0]) return A[0].slice(1);
  for (let i = 1; i < A.length; i++) {
    if (s <= A[i][0]) {
      const t = (s - A[i-1][0]) / (A[i][0] - A[i-1][0]);
      return [
        A[i-1][1] + t * (A[i][1] - A[i-1][1]),
        A[i-1][2] + t * (A[i][2] - A[i-1][2]),
        A[i-1][3] + t * (A[i][3] - A[i-1][3]),
      ];
    }
  }
  return A[A.length - 1].slice(1);
}

function stepsToColor(s) {
  const [h, sat, l] = interpolateHSL(s);
  return `hsl(${h.toFixed(1)},${sat.toFixed(1)}%,${l.toFixed(1)}%)`;
}

// ── formatting ─────────────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString(); }

function fmtDate(s) {
  const [y, m, d] = s.split('-');
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return `${months[+m-1]} ${+d}, ${y}`;
}

// ── stats ──────────────────────────────────────────────────────────────────
function calcStats(data) {
  const total  = data.reduce((s, d) => s + d.steps, 0);
  const avg    = Math.round(total / data.length);
  const atGoal = data.filter(d => d.steps >= 10000).length;
  let streak = 0;
  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i].steps >= 10000) streak++;
    else break;
  }
  return { total, avg, atGoal, streak, days: data.length };
}

function renderStats(stats) {
  document.getElementById('stats').innerHTML = [
    { val: fmt(stats.total),                                        lbl: 'total steps' },
    { val: `${stats.atGoal} / ${stats.days}`,                      lbl: 'days at goal' },
    { val: fmt(stats.avg),                                         lbl: 'daily average' },
    { val: `${stats.streak} day${stats.streak !== 1 ? 's' : ''}`, lbl: 'current streak' },
  ].map(c =>
    `<div class="card"><div class="card-val">${c.val}</div><div class="card-lbl">${c.lbl}</div></div>`
  ).join('');
}

// ── heatmap ────────────────────────────────────────────────────────────────
const MONTH_NAMES = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                     'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const DOW_LABELS  = ['M','T','W','T','F','S','S'];

function renderMonths(dataMap) {
  const monthKeys = Array.from({ length: 12 }, (_, i) =>
    `2026-${String(i + 1).padStart(2, '0')}`
  );

  document.getElementById('months').innerHTML = monthKeys.map((ym, mi) => {
    const [year, month] = ym.split('-').map(Number);
    const monthIdx    = month - 1;
    const mm          = String(month).padStart(2, '0');
    const firstDow    = (new Date(year, monthIdx, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();

    let goalCount = 0, dataCount = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${year}-${mm}-${String(d).padStart(2, '0')}`;
      if (dataMap[key] !== undefined) { dataCount++; if (dataMap[key] >= 10000) goalCount++; }
    }

    const dowHdr = DOW_LABELS.map(d => `<div class="dow-lbl">${d}</div>`).join('');

    let cells = '';
    for (let i = 0; i < firstDow; i++) cells += `<div class="cell empty"></div>`;
    for (let day = 1; day <= daysInMonth; day++) {
      const key   = `${year}-${mm}-${String(day).padStart(2, '0')}`;
      const steps = dataMap[key];
      if (steps !== undefined) {
        cells += `<div class="cell day" style="background:${stepsToColor(steps)}"
          data-date="${key}" data-steps="${steps}"></div>`;
      } else {
        cells += `<div class="cell no-data"></div>`;
      }
    }

    const sub   = dataCount > 0 ? `<em>${goalCount}</em>/${dataCount} at goal` : '';
    const delay = (mi * 0.05 + 0.3).toFixed(2);

    return `<div class="month" style="animation-delay:${delay}s">
      <div class="month-name">${MONTH_NAMES[monthIdx]}</div>
      <div class="dow-row">${dowHdr}</div>
      <div class="grid">${cells}</div>
      <div class="month-sub">${sub}</div>
    </div>`;
  }).join('');
}

// ── legend ─────────────────────────────────────────────────────────────────
function renderLegend(p) {
  document.getElementById('legend').innerHTML =
    `<span class="leg-label">steps →</span>
     <div class="leg-grad" style="background:${p.gradient}"></div>
     <div class="leg-items">
       ${p.swatches.map(s =>
         `<div class="leg-item">
            <div class="leg-sq" style="background:${s.c}"></div>
            <span class="leg-t">${s.l}</span>
          </div>`
       ).join('')}
     </div>`;
}

// ── palette switcher ────────────────────────────────────────────────────────
function applyPalette(key) {
  const p    = PALETTES[key];
  const root = document.documentElement;
  Object.entries(p.vars).forEach(([k, v]) => root.style.setProperty(k, v));
  activeAnchors = p.anchors;
  document.getElementById('palette-desc').textContent = p.desc;
  renderMonths(dataMap);
  renderLegend(p);
}

// ── year progress bar ───────────────────────────────────────────────────────
function renderProgress(days) {
  const pct = (days / 365 * 100).toFixed(1);
  setTimeout(() => { document.getElementById('progress-fill').style.width = pct + '%'; }, 80);
}

// ── tooltip ─────────────────────────────────────────────────────────────────
function setupTooltip() {
  const tip  = document.getElementById('tip');
  const tipD = document.getElementById('tip-d');
  const tipS = document.getElementById('tip-s');
  const tipG = document.getElementById('tip-g');
  const GOAL = 10000;

  document.addEventListener('mousemove', e => {
    const cell = e.target.closest('.cell.day');
    if (!cell) { tip.className = ''; return; }

    const steps = parseInt(cell.dataset.steps, 10);
    const delta = steps - GOAL;
    tipD.textContent = fmtDate(cell.dataset.date);
    tipS.textContent = fmt(steps) + ' steps';
    tipG.textContent = delta >= 0 ? '+' + fmt(delta) + ' above goal' : fmt(Math.abs(delta)) + ' below goal';
    tipG.className   = 'tip-delta ' + (delta >= 0 ? 'up' : 'dn');
    tip.className    = 'show';

    const W = window.innerWidth, H = window.innerHeight;
    const TW = 220, TH = 90;
    let x = e.clientX + 18, y = e.clientY - 62;
    if (x + TW > W) x = e.clientX - TW - 10;
    if (y < 0)       y = e.clientY + 18;
    if (y + TH > H)  y = H - TH - 8;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
}

// ── init ───────────────────────────────────────────────────────────────────
const data    = parse(CSV);
const dataMap = buildMap(data);
const stats   = calcStats(data);

document.getElementById('days-tracked').textContent =
  `${data.length} of 365 days · ${Math.round(data.length / 365 * 100)}% of year`;
document.getElementById('palette-desc').textContent = PALETTES.spectral.desc;

renderProgress(data.length);
renderStats(stats);
renderMonths(dataMap);
renderLegend(PALETTES.spectral);
setupTooltip();
</script>
</body>
</html>
